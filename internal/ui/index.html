<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>pricectl</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --border: #2a2d3a;
      --text: #e2e4ed;
      --muted: #6b7280;
      --green: #34d399;
      --red: #f87171;
      --yellow: #fbbf24;
      --blue: #60a5fa;
      --radius: 10px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 15px;
      line-height: 1.5;
      padding: 32px 24px;
      max-width: 860px;
      margin: 0 auto;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 36px;
    }

    header h1 {
      font-size: 20px;
      font-weight: 700;
      letter-spacing: -0.3px;
    }

    header h1 span { color: var(--blue); }

    button {
      background: var(--blue);
      color: #0f1117;
      border: none;
      border-radius: 7px;
      padding: 9px 20px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
    }

    button:hover { opacity: 0.85; }
    button:disabled { opacity: 0.4; cursor: not-allowed; }

    .spinner {
      display: none;
      width: 16px; height: 16px;
      border: 2px solid #0f1117;
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      vertical-align: middle;
      margin-left: 6px;
    }
    .loading .spinner { display: inline-block; }
    @keyframes spin { to { transform: rotate(360deg); } }

    section { margin-bottom: 40px; }

    h2 {
      font-size: 13px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      margin-bottom: 14px;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }

    .product-row {
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: center;
      padding: 14px 18px;
      border-bottom: 1px solid var(--border);
      gap: 12px;
    }
    .product-row:last-child { border-bottom: none; }

    .product-name { font-weight: 500; }
    .product-url {
      font-size: 12px;
      color: var(--muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 420px;
    }
    .product-url a {
      color: inherit;
      text-decoration: none;
    }
    .product-url a:hover {
      text-decoration: underline;
    }

    .price {
      font-size: 17px;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
      white-space: nowrap;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 12px;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 20px;
    }
    .badge-green  { background: rgba(52,211,153,0.12); color: var(--green); }
    .badge-red    { background: rgba(248,113,113,0.12); color: var(--red); }
    .badge-muted  { background: rgba(107,114,128,0.12); color: var(--muted); }
    .badge-new    { background: rgba(96,165,250,0.12);  color: var(--blue); }
    .badge-yellow { background: rgba(251,191,36,0.12);  color: var(--yellow); }

    .history-block {
      border-bottom: 1px solid var(--border);
      padding: 16px 18px;
    }
    .history-block:last-child { border-bottom: none; }

    .history-name {
      font-weight: 600;
      margin-bottom: 10px;
    }

    .history-entries {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .history-entry {
      display: grid;
      grid-template-columns: 140px 100px 1fr;
      font-size: 13px;
      color: var(--muted);
    }
    .history-entry .price { font-size: 13px; color: var(--text); font-weight: 600; }

    .empty { padding: 24px 18px; color: var(--muted); font-size: 14px; }

    .error-text { color: var(--red); font-size: 13px; }

    #status-bar {
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 20px;
      min-height: 20px;
    }
  </style>
</head>
<body>

<header>
  <h1>price<span>ctl</span></h1>
  <button id="check-btn" onclick="runCheck()">
    Check prices <span class="spinner" id="spinner"></span>
  </button>
</header>

<div id="status-bar"></div>

<section id="products-section">
  <h2>Products</h2>
  <div class="card" id="products-list"><div class="empty">Loading…</div></div>
</section>

<section id="history-section">
  <h2>Price history</h2>
  <div class="card" id="history-list"><div class="empty">Loading…</div></div>
</section>

<script>
  function fmtCents(cents) {
    if (cents == null) return '—';
    const euros = Math.floor(cents / 100);
    const ct = String(cents % 100).padStart(2, '0');
    return euros + '.' + ct;
  }

  function fmtDate(ts) {
    const d = new Date(ts);
    return d.toLocaleDateString('de-DE', { day:'2-digit', month:'2-digit', year:'numeric' })
      + ' ' + d.toLocaleTimeString('de-DE', { hour:'2-digit', minute:'2-digit' });
  }

  function diffBadge(oldCents, newCents) {
    if (oldCents == null) return '';
    const diff = newCents - oldCents;
    if (diff === 0) return '<span class="badge badge-muted">= no change</span>';
    const sign = diff > 0 ? '+' : '';
    const label = sign + fmtCents(Math.abs(diff));
    const cls = diff < 0 ? 'badge-green' : 'badge-red';
    const arrow = diff < 0 ? '▼' : '▲';
    return `<span class="badge ${cls}">${arrow} ${sign}${fmtCents(diff)}</span>`;
  }

  async function loadProducts() {
    const el = document.getElementById('products-list');
    try {
      const res = await fetch('/api/products');
      const data = await res.json();
      if (!data.length) { el.innerHTML = '<div class="empty">No products configured.</div>'; return; }
      el.innerHTML = data.map(p => `
        <div class="product-row">
          <div>
            <div class="product-name">${esc(p.name)}</div>
            <div class="product-url"><a href="${esc(p.url)}" target="_blank" rel="noopener">${esc(p.url)}</a></div>
          </div>
          <div class="product-row-right" style="display:flex;align-items:center;gap:12px">
            <div class="price">${fmtCents(p.price_cents)}</div>
          </div>
        </div>`).join('');
    } catch(e) {
      el.innerHTML = `<div class="empty error-text">Failed to load products.</div>`;
    }
  }

  async function loadHistory() {
    const el = document.getElementById('history-list');
    try {
      const res = await fetch('/api/history');
      const data = await res.json();
      if (!data.length) { el.innerHTML = '<div class="empty">No history yet.</div>'; return; }
      el.innerHTML = data.map(product => {
        const entries = product.entries || [];
        const rows = entries.map((e, i) => {
          const prev = i > 0 ? entries[i-1].price_cents : null;
          return `<div class="history-entry">
            <span>${fmtDate(e.timestamp)}</span>
            <span class="price">${fmtCents(e.price_cents)}</span>
            <span>${diffBadge(prev, e.price_cents)}</span>
          </div>`;
        }).reverse().join('');
        return `<div class="history-block">
          <div class="history-name">${esc(product.name)}</div>
          <div class="history-entries">${rows || '<span style="color:var(--muted);font-size:13px">No entries</span>'}</div>
        </div>`;
      }).join('');
    } catch(e) {
      el.innerHTML = `<div class="empty error-text">Failed to load history.</div>`;
    }
  }

  async function runCheck() {
    const btn = document.getElementById('check-btn');
    const status = document.getElementById('status-bar');

    // Collect product names from the current product list rows
    const rows = document.querySelectorAll('#products-list .product-row');
    if (!rows.length) return;
    const total = rows.length;
    let done = 0;
    let changed = 0;
    let warnings = 0;
    let errors = 0;

    btn.disabled = true;
    btn.classList.add('loading');
    status.textContent = `Checking… (0/${total} done)`;

    // Put each row into loading state: show spinner next to price
    rows.forEach(row => {
      const priceEl = row.querySelector('.price');
      if (priceEl && !priceEl.querySelector('.row-spinner')) {
        const sp = document.createElement('span');
        sp.className = 'row-spinner spinner';
        sp.style.display = 'inline-block';
        sp.style.borderColor = 'var(--muted)';
        sp.style.borderTopColor = 'transparent';
        priceEl.appendChild(sp);
      }
      // Clear any previous badges
      row.querySelectorAll('.check-badge').forEach(el => el.remove());
    });

    // Map name → row element for fast lookup
    const rowByName = {};
    rows.forEach(row => {
      const name = row.querySelector('.product-name')?.textContent;
      if (name) rowByName[name] = row;
    });

    // Fire one request per product in parallel
    const products = Array.from(rows).map(row => row.querySelector('.product-name')?.textContent).filter(Boolean);

    const promises = products.map(async name => {
      try {
        const res = await fetch('/api/check?name=' + encodeURIComponent(name), { method: 'POST' });
        const r = await res.json();
        const row = rowByName[name];
        if (!row) return;

        // Remove spinner
        row.querySelector('.row-spinner')?.remove();

        const priceEl = row.querySelector('.price');
        if (r.error) {
          errors++;
          const badge = document.createElement('span');
          badge.className = 'badge badge-red check-badge';
          badge.textContent = 'ERROR: ' + r.error;
          row.querySelector('.product-row-right')?.prepend(badge);
        } else {
          if (r.changed) changed++;
          if (r.structure_changed) warnings++;

          // Update displayed price
          if (priceEl) priceEl.textContent = fmtCents(r.price_cents);

          // Insert result badge
          const badgeHTML = r.is_new
            ? '<span class="badge badge-new check-badge">★ new</span>'
            : r.structure_changed
              ? diffBadge(r.old_price_cents, r.price_cents).replace('class="badge', 'class="badge check-badge') + ' <span class="badge badge-yellow check-badge">⚠ verify price</span>'
              : diffBadge(r.old_price_cents, r.price_cents).replace('class="badge', 'class="badge check-badge');
          const wrapper = row.querySelector('.product-row-right');
          if (wrapper && badgeHTML) wrapper.insertAdjacentHTML('afterbegin', badgeHTML);
        }
      } catch(e) {
        errors++;
        const row = rowByName[name];
        if (row) {
          row.querySelector('.row-spinner')?.remove();
          const badge = document.createElement('span');
          badge.className = 'badge badge-red check-badge';
          badge.textContent = 'ERROR: ' + e.message;
          row.querySelector('.product-row-right')?.prepend(badge);
        }
      }

      done++;
      status.textContent = done < total
        ? `Checking… (${done}/${total} done)`
        : `Done. ${total} products checked, ${changed} changed, ${warnings} warnings, ${errors} errors.`;
    });

    await Promise.all(promises);

    // Refresh history after all checks
    loadHistory();

    btn.disabled = false;
    btn.classList.remove('loading');
  }

  function esc(str) {
    return String(str)
      .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
      .replace(/"/g,'&quot;');
  }

  loadProducts();
  loadHistory();
</script>
</body>
</html>
